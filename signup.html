<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <!-- Bootstrap 1 Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="asset/css/auth.css">
</head>
<body>
    <div class="wrapper col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
        <form class="login-form bg-white p-5">
            <div class="mb-4">
                <h1 class="text-dark fw-bolder fs-4">SIGN UP</h1>
                <p>Please enter your data to create account</p>
            </div>
            <div class="mb-3">
                <label for="txtName" class="form-label ">Name</label>
                <input type="email" class="form-control" id="txtName" required>
            </div>
            <div class="mb-3">
                <label for="txtEmail" class="form-label ">Email</label>
                <input type="email" class="form-control" id="txtEmail" required>
            </div>
            <div class="mb-3">
                <label for="txtPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="txtPassword" required>
            </div>
            <div class="mb-4">
                <label for="txtConfirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="txtConfirmPassword" required>
            </div>
            <input type="submit" class="btn btn-danger w-100 mb-3" value="Sign Up" id="btnSignUp">
            <div class="row m-0 mb-2 position-relative align-items-center">
                <hr class="col-5">
                <div class="col-2 text-center text-muted mb-3">OR</div>
                <hr class="col-5">
            </div>
            <div class="row m-0 mb-4 justify-content-between">
                <button class="btn btn-outline-danger w-49"><span class="bi-google" id="btnSignGoogle"></span></button>
                <button class="btn btn-outline-primary w-49"><span class="bi-facebook" id="btnSignFacebook"></span></button>
            </div>
            <div class="row text-center">
                <p>Already have an account? <a href="signin.html" class="text-decoration-none">Sign In</a></p>
            </div>
        </form>
    </div>
</body>
</html>
