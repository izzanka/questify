<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <!-- Bootstrap 1 Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="asset/css/signin.css">
</head>
<body>     
    <div class="wrapper col-sm-8 col-lg-4">
        <form class="login-form bg-white p-5">
            <div class="mb-4">
                <h1 class="text-dark fw-bolder fs-4">SIGN IN</h1>
                <p>Please sign in to continue</p>
            </div>
            <div class="mb-3">
                <label for="txtEmail" class="form-label ">Email</label>
                <input type="email" class="form-control" id="txtEmail">
            </div>
            <div class="mb-3">
                <label for="txtPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="txtPassword">
            </div>
            <div class="row mb-3">   
                <div class="col-6">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="cbRememberMe">
                        <label for="cbRememberMe" class="form-check-label">Remember Me</label>
                    </div>
                </div>
                <div class="col-6 text-end">
                    <a href="#" class="text-decoration-none">Forgot Password?</a>
                </div>
            </div>
            <input type="button" class="btn btn-danger w-100 mb-3" value="Sign In">
            <div class="row m-0 mb-2 position-relative align-items-center">
                <hr class="col-5">
                <div class="col-2 text-center text-muted mb-3">OR</div>
                <hr class="col-5">
            </div>
            <div class="row m-0 mb-4 justify-content-between">
                <button class="btn btn-outline-danger w-49"><span class="bi-google"></span></button>
                <button class="btn btn-outline-primary w-49"><span class="bi-facebook"></span></button>
            </div>
            <div class="row text-center">
                <p>Don't have an account? <a href="#" class="text-decoration-none">Sign Up</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
</body>
</html>
